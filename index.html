<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yam Pilates Studio</title>
  <meta name="description" content="Yam Pilates Studio — La energía de fluir en movimiento. Punta Mogotes, Mar del Plata." />
  <style>
    :root {
      --fondo: #f4f1ec;
      --texto: #3a3a38;
      --acento: #8a9a8b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--fondo);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .contenido { max-width: 640px; }
    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .slogan {
      margin-top: 1rem;
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-style: italic;
      color: var(--acento);
      letter-spacing: 0.05em;
    }
    .datos {
      margin-top: 2.5rem;
      font-size: 0.95rem;
      line-height: 1.9;
      opacity: 0.85;
    }
    .datos a { color: var(--acento); text-decoration: none; }
    .datos a:hover { text-decoration: underline; }
    .proximamente {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <main class="contenido">
    <h1>Yam Pilates</h1>
    <p class="slogan">La energía de fluir en movimiento</p>
    <div class="datos">
      <p>Instructora Paola Parra</p>
      <p>Puan 1873 · Punta Mogotes</p>
      <p><a href="https://instagram.com/yam_pilates" target="_blank" rel="noopener">@yam_pilates</a></p>
    </div>
    <p class="proximamente">Sitio en construcción</p>
  </main>
</body>
</html>
